name: izumi

description: Izumi BioSciences
publish_to: 'none'

version: 1.0.58+58

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  hugeicons: ^0.0.11
  pinput: ^5.0.0
  fl_chart: ^0.69.0
  go_router: ^14.3.0
  intl: ^0.20.0
  url_launcher: ^6.3.0
  camera: ^0.11.0+2
  flutter_svg: ^2.0.10

  # State Management
  provider: ^6.1.0

  # Image handling
  image_picker: ^1.0.7
  cached_network_image: ^3.4.1

  # Permissions
  permission_handler: ^11.3.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_database: ^11.2.1
  firebase_storage: ^12.3.7
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  firebase_analytics: ^11.3.6
  firebase_crashlytics: ^4.2.1

  # Cloud Functions
  cloud_functions: ^5.2.0

  # App Check (skips reCAPTCHA for phone auth)
  firebase_app_check: ^0.3.1

  # Maps
  google_maps_flutter: ^2.10.0

  # Location services
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_foreground_task: ^9.2.1
  flutter_activity_recognition: ^4.0.0
  sqflite: ^2.4.2
  connectivity_plus: ^7.0.0
  disable_battery_optimization: ^1.1.2

  # Image compression
  flutter_image_compress: ^2.3.0

  # Gallery saving
  gal: ^2.3.0

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.0
  http: ^1.2.0
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5
  path_provider_linux: ^2.2.1
  path_provider_windows: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  image_picker_android:
    path: third_party/flutter_plugins/image_picker_android
  shared_preferences_android:
    path: third_party/flutter_plugins/shared_preferences_android
  url_launcher_android:
    path: third_party/flutter_plugins/url_launcher_android

flutter:
  uses-material-design: true
  assets:
    - assets/branding/izumi_logo.svg
    - assets/branding/launcher_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/launcher_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: assets/branding/launcher_icon.png
  web:
    generate: true
    image_path: assets/branding/launcher_icon.png
    background_color: "#1a1f2e"
    theme_color: "#1a1f2e"
