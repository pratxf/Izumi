name: izumi

description: Izumi BioSciences
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  iconsax_flutter: ^1.0.0
  pinput: ^5.0.0
  fl_chart: ^0.69.0
  go_router: ^14.3.0
  intl: ^0.20.0
  url_launcher: ^6.3.0
  camera: ^0.11.0+2
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/izumi_logo.svg
    - assets/branding/launcher_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/launcher_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
